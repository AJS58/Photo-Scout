<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Photo Scout" />
  <title>Photo Scout</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <div class="splash-logo">📸</div>
    <div class="splash-title">Photo Scout</div>
    <div class="splash-subtitle">Professional Location Scouting</div>
  </div>

  <main class="app-shell">
    <header class="app-header">
      <div class="logo"><span>📸</span><span>Photo Scout</span></div>
      <div class="header-actions">
        <button class="icon-btn" id="installBtn" hidden>Install</button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙️</button>
        <span class="clock" id="time"></span>
      </div>
    </header>

    <nav class="tabs" aria-label="Main sections">
      <button class="tab active" data-tab="scout">📷 Scout</button>
      <button class="tab" data-tab="locations">📍 Locations (<span id="locationCount">0</span>)</button>
      <button class="tab" data-tab="planner">🗓️ Planner</button>
      <button class="tab" data-tab="help">❔ Help</button>
    </nav>

    <section id="scoutTab" class="tab-panel active">
      <div class="camera-view" id="cameraView">
        <video id="videoElement" autoplay playsinline muted></video>
        <button class="camera-switch" id="cameraSwitchBtn" hidden>🔄 Flip</button>
        <button class="grid-toggle" id="gridToggle">▦ Grid: OFF</button>
        <button class="capture-btn" id="captureBtn" hidden aria-label="Capture photo"></button>
        <div class="exposure-overlay" id="exposureOverlay" hidden></div>
        <div class="rule-of-thirds" id="ruleOfThirds" aria-hidden="true">
          <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <line x1="33.33" y1="0" x2="33.33" y2="100" />
            <line x1="66.66" y1="0" x2="66.66" y2="100" />
            <line x1="0" y1="33.33" x2="100" y2="33.33" />
            <line x1="0" y1="66.66" x2="100" y2="66.66" />
          </svg>
        </div>
      </div>
      <div class="quick-bar">
        <button class="btn btn-secondary" id="galleryBtn">🖼️ Gallery</button>
        <button class="btn btn-secondary" id="gpsBtn">📍 GPS</button>
        <button class="btn btn-secondary" id="zebraBtn">🔴 Zebras</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden />
    </section>

    <section id="analysisView" class="tab-panel"></section>
    <section id="locationsTab" class="tab-panel"></section>
    <section id="plannerTab" class="tab-panel"></section>
    <section id="helpTab" class="tab-panel"></section>
  </main>

  <dialog id="saveDialog" class="modal-card">
    <form method="dialog" class="dialog-body">
      <h2>Save Location</h2>
      <label>Location name<input type="text" id="locationName" placeholder="e.g. Sunset Beach" /></label>
      <label>Return date/time<input type="datetime-local" id="returnDateTime" /></label>
      <div class="dialog-actions">
        <button class="btn btn-secondary" value="cancel">Cancel</button>
        <button class="btn btn-primary" id="confirmSaveBtn" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="detailDialog" class="modal-card wide">
    <div class="dialog-body" id="detailContent"></div>
  </dialog>

  <dialog id="tutorialDialog" class="modal-card wide">
    <div class="dialog-body" id="tutorialContent"></div>
  </dialog>

  <script src="data/recommendations.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/analyser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
