<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Photo Scout" />
  <title>Photo Scout</title>
  <link rel="manifest" href="manifest.json?v=7" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=7" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png?v=7" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <div class="splash-logo">📸</div>
    <div class="splash-title">Photo Scout</div>
    <div class="splash-subtitle">Professional Location Scouting</div>
  </div>

  <main class="app-shell">
    <header class="app-header">
      <div class="logo"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 8.2h3.1l1.2-2.1h5.4l1.2 2.1H20a2 2 0 0 1 2 2v7.1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-7.1a2 2 0 0 1 2-2Z"/><circle cx="12" cy="13.6" r="3.6"/><circle cx="18.3" cy="10.3" r=".8"/></svg></span><span>Photo Scout</span></div>
      <div class="header-actions">
        <button class="icon-btn" id="installBtn" hidden>Install</button>
        <button class="icon-btn icon-only" id="settingsBtn" aria-label="Settings"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 2-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V20h-2.8v-.2a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1-2-2 .1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.6-1H3v-2.8h.2a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-2 .1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V4h2.8v.2a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1 2 2-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2V13h-.2a1.7 1.7 0 0 0-1.6 1Z"/></svg></span></button>
        <span class="clock" id="time"></span>
      </div>
    </header>

    <nav class="tabs" aria-label="Main sections">
      <button class="tab active" data-tab="scout"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 8.2h3.1l1.2-2.1h5.4l1.2 2.1H20a2 2 0 0 1 2 2v7.1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-7.1a2 2 0 0 1 2-2Z"/><circle cx="12" cy="13.6" r="3.6"/><circle cx="18.3" cy="10.3" r=".8"/></svg></span><span>Scout</span></button>
      <button class="tab" data-tab="locations"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s6-5.2 6-11a6 6 0 1 0-12 0c0 5.8 6 11 6 11Z"/><circle cx="12" cy="10" r="2.2"/></svg></span><span>Locations (<span id="locationCount">0</span>)</span></button>
      <button class="tab" data-tab="planner"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="5.5" width="16" height="15" rx="2"/><path d="M8 3.5v4M16 3.5v4M4 10h16"/></svg></span><span>Planner</span></button>
      <button class="tab" data-tab="help"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.8 9a2.4 2.4 0 0 1 4.5 1.2c0 1.8-2.3 2-2.3 3.8M12 17.5h.01"/></svg></span><span>Help</span></button>
    </nav>

    <section id="scoutTab" class="tab-panel active">
      <div class="camera-view" id="cameraView">
        <video id="videoElement" autoplay playsinline muted></video>
        <button class="camera-switch" id="cameraSwitchBtn" hidden>🔄 Flip</button>
        <button class="grid-toggle" id="gridToggle">▦ Grid: OFF</button>
        <button class="capture-btn" id="captureBtn" hidden aria-label="Capture photo"></button>
        <div class="exposure-overlay" id="exposureOverlay" hidden></div>
        <div class="histogram-panel" id="histogramPanel" hidden>
          <div class="histogram-title">Live Histogram</div>
          <canvas id="histogramCanvas" width="220" height="90"></canvas>
          <div class="histogram-labels"><span>Shadows</span><span>Highlights</span></div>
        </div>

        <div class="zoom-control" id="zoomControl" hidden>
          <div class="zoom-header">
            <span>Zoom</span>
            <strong id="zoomValue">1.0×</strong>
          </div>
          <input type="range" id="zoomSlider" min="1" max="1" step="0.1" value="1" aria-label="Camera zoom" />
        </div>

        <div class="camera-meta-overlay" id="cameraMetaOverlay" hidden>
          <div class="overlay-title">Camera Info</div>
          <div id="cameraMetaContent">Waiting for camera…</div>
        </div>

        <div class="exposure-control" id="exposureControl" hidden>
          <div class="overlay-title">Exposure Control</div>
          <div id="exposureSupportText" class="small muted-light">Checking camera support…</div>
          <label id="evRow" hidden>
            <span>EV Compensation <strong id="evValue">0</strong></span>
            <input type="range" id="evSlider" min="-2" max="2" step="0.1" value="0" />
          </label>
          <label id="isoRow" hidden>
            <span>ISO <strong id="isoValue">Auto</strong></span>
            <input type="range" id="isoSlider" min="50" max="3200" step="50" value="100" />
          </label>
          <button class="mini-btn" id="autoExposureBtn" type="button">Auto Exposure</button>
        </div>
        <div class="rule-of-thirds" id="ruleOfThirds" aria-hidden="true">
          <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <line x1="33.33" y1="0" x2="33.33" y2="100" />
            <line x1="66.66" y1="0" x2="66.66" y2="100" />
            <line x1="0" y1="33.33" x2="100" y2="33.33" />
            <line x1="0" y1="66.66" x2="100" y2="66.66" />
          </svg>
        </div>
      </div>
      <div class="quick-bar">
        <button class="btn btn-secondary" id="galleryBtn"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 14l3-3 3 3 2-2 3 3"/><circle cx="8" cy="9" r="1"/></svg></span> Gallery</button>
        <button class="btn btn-secondary" id="gpsBtn"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s6-5.2 6-11a6 6 0 1 0-12 0c0 5.8 6 11 6 11Z"/><circle cx="12" cy="10" r="2.2"/></svg></span> GPS</button>
        <button class="btn btn-secondary" id="zebraBtn"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 10h16M4 15h16M4 20h16"/><path d="M7 4l-3 17M13 4l-3 17M19 4l-3 17"/></svg></span> Zebras</button>
        <button class="btn btn-secondary" id="histogramBtn"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="12" width="2.5" height="6" rx=".5"/><rect x="11" y="8" width="2.5" height="10" rx=".5"/><rect x="15" y="5" width="2.5" height="13" rx=".5"/></svg></span> Histogram</button>
        <button class="btn btn-secondary" id="exposureBtn"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 4v16M4 12h16"/></svg></span> Exposure</button>
        <button class="btn btn-secondary" id="metaBtn"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M8 9h8M8 13h5M8 17h7"/></svg></span> Info</button>
      </div>
      <div class="scout-weather-panel" id="scoutWeatherPanel" hidden></div>
      <input type="file" id="fileInput" accept="image/*" hidden />
    </section>

    <section id="analysisView" class="tab-panel"></section>
    <section id="locationsTab" class="tab-panel"></section>
    <section id="plannerTab" class="tab-panel"></section>
    <section id="helpTab" class="tab-panel"></section>
  </main>

  <dialog id="saveDialog" class="modal-card">
    <form method="dialog" class="dialog-body">
      <h2>Save Location</h2>
      <label>Location name<input type="text" id="locationName" placeholder="e.g. Sunset Beach" /></label>
      <label>Return date/time<input type="datetime-local" id="returnDateTime" /></label>
      <div class="dialog-actions">
        <button class="btn btn-secondary" value="cancel">Cancel</button>
        <button class="btn btn-primary" id="confirmSaveBtn" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="detailDialog" class="modal-card wide">
    <div class="dialog-body" id="detailContent"></div>
  </dialog>

  <dialog id="tutorialDialog" class="modal-card wide">
    <div class="dialog-body" id="tutorialContent"></div>
  </dialog>

  <script src="data/recommendations.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/analyser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
